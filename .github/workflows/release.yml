name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VITE_PRIVY_APP_ID: ${{ secrets.VITE_PRIVY_APP_ID || vars.VITE_PRIVY_APP_ID }}
  VITE_PRIVY_CLIENT_ID: ${{ secrets.VITE_PRIVY_CLIENT_ID || vars.VITE_PRIVY_CLIENT_ID }}

jobs:
  staging:
    name: Deploy staging
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          path: web
      - uses: actions/checkout@v4
        with:
          repository: pirate-social-club/api
          path: api
          token: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Install API dependencies
        working-directory: api/services/api
        run: bun install --frozen-lockfile
      - name: Deploy staging
        working-directory: web
        run: scripts/deploy-staging.sh
      - name: Verify staging/prod metadata
        working-directory: web
        run: scripts/check-deployments.sh --no-strict
      - name: Smoke staging
        working-directory: web
        run: scripts/smoke-test.sh staging

  production:
    name: Deploy production
    needs: staging
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          path: web
      - uses: actions/checkout@v4
        with:
          repository: pirate-social-club/api
          path: api
          token: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Install API dependencies
        working-directory: api/services/api
        run: bun install --frozen-lockfile
      - name: Deploy production
        working-directory: web
        run: scripts/deploy-production.sh --confirm-production --skip-tests
