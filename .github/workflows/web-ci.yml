name: web-ci

on:
  pull_request:
    paths:
      - ".github/workflows/web-ci.yml"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "worker-configuration.d.ts"
      - "scripts/**"
      - "src/**"
  push:
    paths:
      - ".github/workflows/web-ci.yml"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "worker-configuration.d.ts"
      - "scripts/**"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run types

      - name: Run unit tests
        run: bun run test

      - name: Run DOM integration tests
        run: bun run test:web

      - name: Build
        run: bun run build
