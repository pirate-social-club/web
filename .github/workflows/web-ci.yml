name: web-ci

on:
  pull_request:
    paths:
      - ".github/workflows/web-ci.yml"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "vite.config.ts"
      - "worker-configuration.d.ts"
      - "scripts/**"
      - "src/**"
  push:
    paths:
      - ".github/workflows/web-ci.yml"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "vite.config.ts"
      - "worker-configuration.d.ts"
      - "scripts/**"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-1.2.21-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.2.21-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run types

      - name: Verify SSR build
        shell: bash
        run: |
          set -o pipefail
          bun run locales:generate
          ./node_modules/.bin/vite build --ssr src/worker.tsx --minify false --sourcemap false 2>&1 | tee vite-ssr.log

      - name: Upload SSR build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vite-ssr-log
          path: vite-ssr.log
